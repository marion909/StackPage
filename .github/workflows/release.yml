name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "StackPage ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `.msi` installer or `.exe` setup |
            | macOS    | `.dmg` disk image |
            | Linux    | `.deb` / `.AppImage` |

            See the assets below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ─── releases.json + FTP-Upload (nur Windows) ──────────────────────────
      - name: Generate releases.json
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.sig" |
                     Select-Object -First 1
          $sig     = (Get-Content $sigFile.FullName -Raw).Trim()

          $json = [ordered]@{
            version   = $version
            notes     = "StackPage ${{ github.ref_name }}"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "https://stackpage.at/updates/download/stackpage_${version}_x64-setup.exe"
              }
            }
          }
          $json | ConvertTo-Json -Depth 5 | Set-Content website/updates/releases.json
          Write-Host "releases.json generiert fuer v$version"

      - name: Upload releases.json via FTP
        if: matrix.platform == 'windows-latest'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./website/updates/
          server-dir: /updates/
          dangerous-clean-slate: false

      - name: Upload installer via FTP
        if: matrix.platform == 'windows-latest'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  src-tauri/target/release/bundle/nsis/
          server-dir: /updates/download/
